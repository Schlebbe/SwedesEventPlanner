name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: src/SwedesEventPlanner.Web/package-lock.json

      - name: Build .NET
        run: dotnet build SwedesEventPlanner.slnx

      - name: Test .NET
        run: dotnet test SwedesEventPlanner.slnx --no-build

      - name: Install frontend dependencies
        working-directory: src/SwedesEventPlanner.Web
        run: npm ci

      - name: Build frontend
        working-directory: src/SwedesEventPlanner.Web
        run: npm run build

      - name: Lint frontend
        working-directory: src/SwedesEventPlanner.Web
        run: npm run lint

      - name: Test frontend
        working-directory: src/SwedesEventPlanner.Web
        run: npm test

  integration-test:
    runs-on: ubuntu-latest

    env:
      SWEDES_RUN_POSTGRES_INTEGRATION: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Run PostgreSQL/Testcontainers integration tests
        run: dotnet test tests/SwedesEventPlanner.Application.Tests/SwedesEventPlanner.Application.Tests.csproj --filter "FullyQualifiedName~PostgreSqlIntegrationTests"
